        /* NOISE */
        #noise-overlay{position:fixed;top:-50%;left:-50%;width:200%;height:200%;z-index:996;pointer-events:none;opacity:.04;
            background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
            animation:noiseShift .2s steps(3) infinite;}
        @keyframes noiseShift{0%{transform:translate(0)}33%{transform:translate(-5%,-5%)}66%{transform:translate(5%,3%)}100%{transform:translate(-3%,5%)}}

        /* DATA STREAM */
        #data-stream{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:-1;pointer-events:none;overflow:hidden;}
        .data-bit{position:absolute;font-family:'Share Tech Mono',monospace;color:rgba(200,0,0,.08);font-size:11px;animation:dataFloat linear infinite;white-space:nowrap;}
        @keyframes dataFloat{0%{transform:translateY(100vh) rotate(0);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(-20vh) rotate(5deg);opacity:0}}

        /* HEARTBEAT */
        #heartbeat-vignette{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:997;pointer-events:none;background:radial-gradient(ellipse at center,transparent 50%,rgba(80,0,0,.4) 100%);animation:hbVig 1.1s ease-in-out infinite;}
        @keyframes hbVig{0%{opacity:.3}7%{opacity:.8}14%{opacity:.3}21%{opacity:.7}28%{opacity:.2}100%{opacity:.3}}

        /* CURSOR */

        .cursor-outline{width:30px;height:30px;border:2px solid rgba(200,0,0,.5);border-radius:50%;position:fixed;pointer-events:none;z-index:99999999;transform:translate(-50%,-50%);box-shadow:0 0 10px rgba(200,0,0,.2);transition:width .3s,height .3s,border-color .3s,background .3s;}
        .cursor-dot.hover{width:10px;height:10px;background:#ff0000;box-shadow:0 0 15px rgba(255,0,0,.8);}

        .neon-nick::before,.neon-nick::after{content:attr(data-text);position:absolute;top:0;left:0;width:100%;height:100%;font:inherit;letter-spacing:inherit;}
        .neon-nick::before{color:#0ff;z-index:-1;animation:glL 4s infinite;clip-path:inset(0);}

        @keyframes glL{0%,90%,100%{transform:translate(0);clip-path:inset(0);opacity:0}91%{transform:translate(-4px,2px);clip-path:inset(20% 0 60% 0);opacity:.7}92%{transform:translate(3px,-1px);clip-path:inset(50% 0 20% 0);opacity:.5}93%{transform:translate(-2px,3px);clip-path:inset(10% 0 70% 0);opacity:.6}94%{opacity:0}}
        @keyframes glR{0%,85%,100%{transform:translate(0);clip-path:inset(0);opacity:0}86%{transform:translate(4px,-2px);clip-path:inset(40% 0 30% 0);opacity:.7}87%{transform:translate(-3px,1px);clip-path:inset(60% 0 10% 0);opacity:.5}88%{transform:translate(2px,-3px);clip-path:inset(30% 0 50% 0);opacity:.4}89%{opacity:0}}
        @keyframes neonFlicker{0%,18%,22%,25%,53%,57%,100%{text-shadow:0 0 7px var(--neon),0 0 10px var(--neon),0 0 21px var(--neon),0 0 42px var(--neon-dark),0 0 82px var(--neon-dark),0 0 92px var(--neon-dark),0 0 102px var(--neon-dark),0 0 151px var(--neon-dark)}20%,24%,55%{text-shadow:none;color:#6a0020}}

        #heartbeat-line{position:fixed;bottom:30px;left:0;width:100%;height:60px;z-index:999;pointer-events:none;opacity:.4;}



        /* PAGE GLITCH */
        .page-glitch{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:9999;pointer-events:none;opacity:0;}
        .page-glitch.active{opacity:1;animation:pgGl .15s steps(2);}

        /* SCREEN CRACK */
        #crack-overlay{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:9998;pointer-events:none;opacity:0;transition:opacity .3s;}

        #konami-overlay.show{opacity:1;pointer-events:auto;}
    </style>
</head>

    // ===== AUDIO CONTEXT =====
    let audioCtx;
    function getAudioCtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}

    // ===== HEARTBEAT =====
    function playHeartbeat(){const a=getAudioCtx();function b(t,v){const o=a.createOscillator(),g=a.createGain();o.type='sine';o.frequency.setValueAtTime(55,a.currentTime+t);o.frequency.exponentialRampToValueAtTime(30,a.currentTime+t+.15);g.gain.setValueAtTime(v,a.currentTime+t);g.gain.exponentialRampToValueAtTime(.001,a.currentTime+t+.25);o.connect(g).connect(a.destination);o.start(a.currentTime+t);o.stop(a.currentTime+t+.3);}b(0,.3);b(.15,.2);}

    function playHoverSound(){const a=getAudioCtx(),o=a.createOscillator(),g=a.createGain();o.type='sawtooth';o.frequency.setValueAtTime(800+Math.random()*400,a.currentTime);o.frequency.exponentialRampToValueAtTime(200,a.currentTime+.08);g.gain.setValueAtTime(.03,a.currentTime);g.gain.exponentialRampToValueAtTime(.001,a.currentTime+.1);o.connect(g).connect(a.destination);o.start();o.stop(a.currentTime+.1);}

    // ===== ECG =====
    (function(){const c=document.getElementById('heartbeat-line');c.width=innerWidth;c.height=60;const x=c.getContext('2d');let o=0;
    function d(){x.clearRect(0,0,c.width,c.height);x.strokeStyle='#cc0000';x.lineWidth=2;x.shadowColor='#ff0000';x.shadowBlur=10;x.beginPath();const m=c.height/2,w=200;
    for(let i=0;i<c.width+w;i++){const r=((i+o)%w)/w;let y=m;if(r>.1&&r<.15)y=m-5;else if(r>.15&&r<.2)y=m+3;else if(r>.2&&r<.25)y=m-Math.sin(((r-.2)/.05)*Math.PI)*25;else if(r>.25&&r<.3)y=m+Math.sin(((r-.25)/.05)*Math.PI)*8;else if(r>.3&&r<.35)y=m-3;else if(r>.45&&r<.5)y=m-4;else if(r>.5&&r<.55)y=m-Math.sin(((r-.5)/.05)*Math.PI)*18;else if(r>.55&&r<.6)y=m+Math.sin(((r-.55)/.05)*Math.PI)*6;i===0?x.moveTo(i,y):x.lineTo(i,y);}x.stroke();o+=1.5;requestAnimationFrame(d);}d();addEventListener('resize',()=>{c.width=innerWidth;});})();

    // ===== MATRIX =====
    (function(){const c=document.getElementById('matrix-canvas'),x=c.getContext('2d');let W,H,cols,drops;function init(){W=c.width=innerWidth;H=c.height=innerHeight;cols=Math.floor(W/14);drops=Array(cols).fill(1);}init();const ch='FxFreeze01アイウエオカキクケコ$#@!%^&*░▒▓█';function d(){x.fillStyle='rgba(0,0,0,0.06)';x.fillRect(0,0,W,H);x.fillStyle='rgba(180,0,0,0.35)';x.font='12px "Share Tech Mono"';for(let i=0;i<cols;i++){x.fillText(ch[Math.floor(Math.random()*ch.length)],i*14,drops[i]*14);if(drops[i]*14>H&&Math.random()>.975)drops[i]=0;drops[i]++;}requestAnimationFrame(d);}d();addEventListener('resize',init);})();

    // ===== GLITCH OVERLAY =====
    (function(){const c=document.getElementById('glitch-canvas'),x=c.getContext('2d');function r(){c.width=innerWidth;c.height=innerHeight;}r();addEventListener('resize',r);function d(){x.clearRect(0,0,c.width,c.height);if(Math.random()<.03){for(let i=0;i<Math.floor(Math.random()*5)+2;i++){x.fillStyle=`rgba(${Math.random()>.5?255:0},${Math.random()>.5?0:255},${Math.random()>.5?255:0},${Math.random()*.15+.02})`;x.fillRect((Math.random()-.5)*40,Math.random()*c.height,c.width,Math.random()*30+5);}for(let i=0;i<3;i++){x.fillStyle=i===0?'rgba(255,0,0,.08)':i===1?'rgba(0,255,0,.05)':'rgba(0,0,255,.05)';x.fillRect(0,Math.random()*c.height,c.width,2);}}if(Math.random()<.005){x.fillStyle=`rgba(255,255,255,${Math.random()*.03})`;x.fillRect(0,0,c.width,c.height);}requestAnimationFrame(d);}d();})();

    // ===== LIGHTNING =====
    (function(){const c=document.getElementById('lightning-canvas'),x=c.getContext('2d');function r(){c.width=innerWidth;c.height=innerHeight;}r();addEventListener('resize',r);function bolt(x1,y1,x2,y2,dp){if(!dp)return;const mx=(x1+x2)/2+(Math.random()-.5)*50,my=(y1+y2)/2+(Math.random()-.5)*50;x.beginPath();x.moveTo(x1,y1);x.lineTo(mx,my);x.lineTo(x2,y2);x.strokeStyle=`rgba(255,${30+Math.random()*30},${Math.random()*30},${.3+dp*.15})`;x.lineWidth=dp*.5;x.stroke();if(Math.random()>.5)bolt(x1,y1,mx,my,dp-1);if(Math.random()>.5)bolt(mx,my,x2,y2,dp-1);}function d(){x.clearRect(0,0,c.width,c.height);if(Math.random()<.008){x.shadowColor='#ff0000';x.shadowBlur=20;bolt(Math.random()*c.width,0,Math.random()*c.width,c.height,5);x.shadowBlur=0;}requestAnimationFrame(d);}d();})();

    // ===== SMOKE / FOG =====
    (function(){const c=document.getElementById('smoke-canvas'),x=c.getContext('2d');c.width=innerWidth;c.height=innerHeight;addEventListener('resize',()=>{c.width=innerWidth;c.height=innerHeight;});const ps=[];for(let i=0;i<60;i++)ps.push({x:Math.random()*c.width,y:c.height+Math.random()*100,r:Math.random()*80+40,sx:(Math.random()-.5)*.3,sy:-(Math.random()*.5+.2),op:Math.random()*.15+.05});
    function d(){x.clearRect(0,0,c.width,c.height);ps.forEach(p=>{p.x+=p.sx+Math.sin(Date.now()*.001+p.r)*.2;p.y+=p.sy;p.op-=.0003;if(p.y<-100||p.op<=0){p.x=Math.random()*c.width;p.y=c.height+50;p.op=Math.random()*.15+.05;}const g=x.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r);g.addColorStop(0,`rgba(60,0,0,${p.op})`);g.addColorStop(1,'rgba(30,0,0,0)');x.fillStyle=g;x.beginPath();x.arc(p.x,p.y,p.r,0,Math.PI*2);x.fill();});requestAnimationFrame(d);}d();})();

    // ===== AUDIO VISUALIZER (fake waveform synced to heartbeat) =====
    (function(){const c=document.getElementById('audio-visualizer'),x=c.getContext('2d');c.width=innerWidth;c.height=80;addEventListener('resize',()=>{c.width=innerWidth;c.height=80;});let t=0;
    function d(){x.clearRect(0,0,c.width,c.height);const bars=64;const bw=c.width/bars;const hb=(t*5.7)%6.28;const pulse=Math.max(0,Math.sin(hb)*Math.sin(hb*2));
    for(let i=0;i<bars;i++){const freq=Math.sin(i*.2+t*3)*.5+.5;const h=(freq*30+pulse*40)*(.5+Math.random()*.5);const r=150+freq*105;x.fillStyle=`rgba(${r},0,${freq*20},${.3+pulse*.4})`;x.shadowColor=`rgba(255,0,0,${pulse*.5})`;x.shadowBlur=pulse*15;x.fillRect(i*bw+1,c.height-h,bw-2,h);x.shadowBlur=0;}t+=.016;requestAnimationFrame(d);}d();})();

    // ===== EM FIELD AROUND CURSOR =====
    (function(){const c=document.getElementById('em-field-canvas'),x=c.getContext('2d');c.width=innerWidth;c.height=innerHeight;addEventListener('resize',()=>{c.width=innerWidth;c.height=innerHeight;});let mx=-999,my=-999;document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});let t=0;
    function d(){x.clearRect(0,0,c.width,c.height);if(mx<0){requestAnimationFrame(d);return;}
    for(let i=0;i<12;i++){const angle=t+i*(Math.PI*2/12);const r1=40+Math.sin(t*3+i)*10;const r2=80+Math.cos(t*2+i)*15;x.beginPath();x.moveTo(mx+Math.cos(angle)*r1,my+Math.sin(angle)*r1);
    const cp1x=mx+Math.cos(angle+.3)*(r1+r2)/2;const cp1y=my+Math.sin(angle+.3)*(r1+r2)/2;x.quadraticCurveTo(cp1x,cp1y,mx+Math.cos(angle+.5)*r2,my+Math.sin(angle+.5)*r2);
    x.strokeStyle=`rgba(255,${20+i*10},0,${.15+Math.sin(t+i)*.1})`;x.lineWidth=1;x.stroke();}t+=.03;requestAnimationFrame(d);}d();})();

    (function(){const c=document.getElementById('avatar-particles'),x=c.getContext('2d');const ps=[];for(let i=0;i<20;i++)ps.push({angle:Math.random()*Math.PI*2,r:35+Math.random()*30,speed:.01+Math.random()*.02,size:Math.random()*2+.5});let t=0;

    // ===== SCREEN CRACK ON GLITCH =====
    (function(){const c=document.getElementById('crack-overlay'),x=c.getContext('2d');c.width=innerWidth;c.height=innerHeight;addEventListener('resize',()=>{c.width=innerWidth;c.height=innerHeight;drawCracks();});

    const pg=document.getElementById('page-glitch');setInterval(()=>{if(Math.random()<.3){pg.classList.add('active');c.classList.add('show');setTimeout(()=>{pg.classList.remove('active');c.classList.remove('show');},200);}},3000);})();

    const trailPool=[];const TC=20;for(let i=0;i<TC;i++){const t=document.createElement('div');t.className='cursor-trail';t.style.opacity='0';document.body.appendChild(t);trailPool.push({el:t});}let tIdx=0;

    // ===== PARTICLE INTRO =====
    (function(){const c=document.getElementById('particle-canvas'),ctx=c.getContext('2d');let W,H;const ps=[];const ms={x:-9999,y:-9999};let tp=[];let started=false,phase='scatter',pt=0;
    function resize(){W=c.width=innerWidth;H=c.height=innerHeight;if(started)getTp();}resize();addEventListener('resize',resize);c.addEventListener('mousemove',e=>{ms.x=e.clientX;ms.y=e.clientY;});
    function getTp(){const o=document.createElement('canvas');o.width=W;o.height=H;const ox=o.getContext('2d');let fs=Math.min(W*.12,120);if(W<500)fs=W*.14;ox.fillStyle='#fff';ox.font=`900 ${fs}px 'Orbitron',sans-serif`;ox.textAlign='center';ox.textBaseline='middle';ox.fillText('Fx_Freeze',W/2,H/2);const d=ox.getImageData(0,0,W,H).data;tp=[];for(let y=0;y<H;y+=4)for(let x=0;x<W;x+=4)if(d[(y*W+x)*4+3]>128)tp.push({x,y});}
    function init(){ps.length=0;getTp();for(let i=0;i<tp.length;i++)ps.push({x:Math.random()*W,y:Math.random()*H,tx:tp[i].x,ty:tp[i].y,sz:Math.random()*2+1,sx:(Math.random()-.5)*4,sy:(Math.random()-.5)*4,op:Math.random()*.5+.3,hue:Math.random()*20});for(let i=0;i<150;i++)ps.push({x:Math.random()*W,y:Math.random()*H,tx:null,ty:null,sz:Math.random()*1.5+.5,sx:(Math.random()-.5),sy:(Math.random()-.5),op:Math.random()*.2+.05,hue:Math.random()*20});}
    function anim(){ctx.fillStyle='rgba(0,0,0,.15)';ctx.fillRect(0,0,W,H);pt+=.016;if(phase==='scatter'&&pt>.5){phase='form';pt=0;}if(phase==='form'&&pt>3){phase='hold';pt=0;}if(phase==='hold'&&pt>2){phase='fadeout';pt=0;}
    if(phase==='form'&&Math.random()<.05)ctx.drawImage(c,(Math.random()-.5)*20,Math.random()*H,W,Math.random()*20+5,0,Math.random()*H,W,Math.random()*20+5);
    for(const p of ps){if(phase==='scatter'){p.x+=p.sx;p.y+=p.sy;if(p.x<0||p.x>W)p.sx*=-1;if(p.y<0||p.y>H)p.sy*=-1;}
    if(phase==='form'&&p.tx!==null){const dx=p.tx-p.x,dy=p.ty-p.y;p.x+=dx*(.04+Math.min(pt*.02,.06));p.y+=dy*(.04+Math.min(pt*.02,.06));}else if(p.tx===null){p.x+=p.sx;p.y+=p.sy;if(p.x<0||p.x>W)p.sx*=-1;if(p.y<0||p.y>H)p.sy*=-1;}
    if(phase==='hold'){if(p.tx!==null){p.x=p.tx+Math.sin(pt*5+p.tx*.01)*1.5;p.y=p.ty+Math.cos(pt*3+p.ty*.01)*.8;}const mdx=p.x-ms.x,mdy=p.y-ms.y,md=Math.sqrt(mdx*mdx+mdy*mdy);if(md<80){p.x+=mdx/md*3;p.y+=mdy/md*3;}}
    if(phase==='fadeout'&&p.tx!==null){const a=Math.atan2(p.y-H/2,p.x-W/2);p.x+=Math.cos(a)*(2+Math.random()*3)*(1+pt);p.y+=Math.sin(a)*(2+Math.random()*3)*(1+pt);p.op*=.98;}else if(phase==='fadeout')p.op*=.96;
    ctx.fillStyle=`rgba(${200+p.hue*2.5},${p.hue*.5},0,${p.op})`;ctx.shadowColor=`rgba(255,0,0,${p.op*.5})`;ctx.shadowBlur=p.sz*6;ctx.beginPath();ctx.arc(p.x,p.y,p.sz,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;}
    if(phase==='fadeout'&&pt>1.5){const ov=document.getElementById('intro-overlay');if(ov&&!ov.classList.contains('hidden')){ov.classList.add('hidden');document.getElementById('bg-audio').play().catch(()=>{});if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume();setTimeout(()=>{if(ov)ov.remove();},1500);}}
    if(phase!=='fadeout'||pt<3)requestAnimationFrame(anim);}
    document.getElementById('intro-overlay').addEventListener('click',()=>{if(started)return;started=true;init();anim();});setTimeout(()=>{if(!started){started=true;init();anim();}},500);})();

    function animO(){oX+=(mX-oX)*.15;oY+=(mY-oY)*.15;outline.style.left=oX+'px';outline.style.top=oY+'px';requestAnimationFrame(animO);}animO();
